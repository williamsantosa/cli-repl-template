# CLI REPL Template configuration
# Place this file in the working directory or at $HOME/.cli-repl/config.yaml

# The display name used in the REPL prompt and welcome screen.
name: "cli-repl"

art:
  # "built-in" uses the embedded pixel art.
  # Place art files in the assets/ directory and use just the filename.
  # They are baked into the binary at build time via go:embed.
  #   - Image files (.png, .jpg, .gif, .bmp) are auto-converted to colored ASCII art
  #   - Text files (.txt) are displayed as-is (for pre-made ANSI art)
  # If the file is not found in the embedded assets, built-in pixel art is used.
  source: "touhou-cirno.gif"

  # Width in characters for image rendering (ignored for .txt and built-in).
  width: 30

  # Character cell width/height ratio. Adjusts for vertical stretching.
  # Default 0.45 works for most fonts. Increase if image looks squished,
  # decrease if it looks stretched.
  cell_ratio: 0.45

  # Wrap the art in a rounded border.
  border: false

  # ANSI 256 color code for the border (63 = purple).
  border_color: "63"

loader:
  # Spinner style. Options: dots, line, minidot, jump, pulse,
  # points, globe, moon, monkey, meter, hamburger
  spinner: "dots"

  # ANSI 256 color code for the spinner (205 = pink).
  spinner_color: "205"

  # Milliseconds between spinner frames.
  speed_ms: 100

  # ANSI 256 color code for the status message text.
  message_color: "252"

welcome:
  # Title shown in the top border of the welcome box.
  # Use {name} for the app name and {version} for the version string.
  title: "{name} v{version}"

  # Greeting shown at the top of the welcome screen.
  # Use {user} to insert the current OS username.
  greeting: "Welcome back, {user}!"

  # Hint text shown below the welcome box.
  hint: "Press any key to continue..."

  # ANSI 256 color code for borders and section headers.
  accent_color: "205"

  # Show the tips panel on the right side of the welcome screen.
  show_tips: true

  # Title for the tips section.
  tips_title: "Tips for getting started"

  # List of tip lines to display.
  tips:
    - "Type 'help' to see commands"
    - "Type 'exit' to leave the REPL"
    - "Sleep 8 hours for a good night's sleep"

  # Show current config info (art source, width).
  show_config: true

  # Show the current working directory.
  show_cwd: true
